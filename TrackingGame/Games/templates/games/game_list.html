{% extends 'base.html' %}

{% block title %}My Games{% endblock %}

{% block content %}
<h1>My Games</h1>
<ul class="list-group">
  {% for g in games %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
      <a href="{% url 'game-detail' g.pk %}">{{ g.game.title }}</a>
      <span class="badge bg-secondary">{{ g.get_status_display }}</span>
    </li>
  {% empty %}
    <li class="list-group-item">No games yet.</li>
  {% endfor %}
</ul>
{% endblock %}
