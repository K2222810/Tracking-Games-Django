{% extends 'base.html' %}
{% load static %}

{% block title %}Add Game{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <h2>Add game</h2>
    <form method="post" class="form-container">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit" name="save">Save</button>
        {% if not form.instance.pk %}
          <button class="btn btn-secondary" type="submit" name="add_to_wishlist">Add to Wishlist</button>
        {% else %}
          <button class="btn btn-success" type="submit" name="mark_purchased">Mark as Purchased</button>
          <a class="btn btn-danger" href="{% url 'game-delete' form.instance.pk %}">Delete</a>
        {% endif %}
      </div>
    </form>
  </div>
</div>
{% endblock %}
